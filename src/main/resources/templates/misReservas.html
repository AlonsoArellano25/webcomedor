<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Reservas | Gestión de Comedor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/home}"
          >☕ Gestión de Comedor</a
        >
        <div class="d-flex gap-3">
          <a class="nav-link text-white" th:href="@{/home}">Inicio</a>
          <a class="nav-link text-white" th:href="@{/misReservas}"
            >Mis Reservas</a
          >
          <a class="nav-link text-white" th:href="@{/logout}">Salir</a>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-white m-0">Mis Reservas</h3>
        <a class="btn btn-light" th:href="@{/reservar}">➕ Crear Reserva</a>
      </div>

      <div
        th:if="${msgOk}"
        class="alert alert-success"
        th:text="${msgOk}"
      ></div>
      <div
        th:if="${msgError}"
        class="alert alert-danger"
        th:text="${msgError}"
      ></div>

      <div class="card card-soft p-3">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Estado</th>
                <th class="text-end">Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="r : ${reservas}">
                <td th:text="${r.idReserva}"></td>
                <td th:text="${#temporals.format(r.fecha,'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(r.hora,'HH:mm')}"></td>
                <td>
                  <span th:if="${r.estado == 1}" class="badge badge-active"
                    >Activa</span
                  >
                  <span th:if="${r.estado != 1}" class="badge badge-cancel"
                    >Cancelada</span
                  >
                </td>
                <td class="text-end">
                  <div th:if="${r.estado == 1}" class="d-inline-flex gap-2">
                    <a
                      class="btn btn-sm btn-outline-primary"
                      th:href="@{'/reservas/editar/' + ${r.idReserva}}"
                      >Editar</a
                    >
                    <a
                      class="btn btn-sm btn-outline-danger"
                      th:href="@{'/reservas/cancelar/' + ${r.idReserva}}"
                      onclick="
                        return confirm(
                          '¿Seguro que deseas cancelar esta reserva?'
                        );
                      "
                      >Cancelar</a
                    >
                  </div>
                  <span th:if="${r.estado != 1}" class="text-muted">-</span>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(reservas)}">
                <td colspan="5" class="text-center text-muted py-4">
                  No tienes reservas registradas.
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          class="d-flex justify-content-center mt-3"
          th:if="${cantidadPaginas > 1}"
        >
          <nav>
            <ul class="pagination">
              <li
                class="page-item"
                th:classappend="${pagActual == 1} ? 'disabled'"
              >
                <a
                  class="page-link"
                  th:href="@{'/misReservas?pag=' + ${pagActual-1}}"
                  >Anterior</a
                >
              </li>

              <li
                class="page-item"
                th:each="i : ${#numbers.sequence(1, cantidadPaginas)}"
                th:classappend="${i == pagActual} ? 'active'"
              >
                <a
                  class="page-link"
                  th:href="@{'/misReservas?pag=' + ${i}}"
                  th:text="${i}"
                ></a>
              </li>

              <li
                class="page-item"
                th:classappend="${pagActual == cantidadPaginas} ? 'disabled'"
              >
                <a
                  class="page-link"
                  th:href="@{'/misReservas?pag=' + ${pagActual+1}}"
                  >Siguiente</a
                >
              </li>
            </ul>
          </nav>
        </div>
      </div>

      <div class="text-center mt-4 footer">© 2026 Gestión de Comedor</div>
    </div>
  </body>
</html>
