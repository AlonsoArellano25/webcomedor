spring.application.name=webcomedor
server.port=8080

# Configuración de la base de datos
## URL de la clase del driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## Cadena de conexión
spring.datasource.url=jdbc:mysql://localhost:3306/comedor
## Usuario de la BD
spring.datasource.username=root
## Password de la BD
spring.datasource.password=3560551

# Configuración de JPA/Hibernate
## Motor de BD utilizado
spring.jpa.database=mysql
## Habilitar la ejecución de sentencias DDL automaticas
spring.jpa.hibernate.ddl-auto=none
## Habilitar que se muestre en consola la ejecución de sentencias SQL
spring.jpa.show-sql=false
## Habilitar en que formato se mostrarán las sentencias SQL
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl